name: Itty Bitty Gaming News - Digest
on:
  workflow_dispatch:
  schedule:
    # Run every 30 minutes; digest.py guard allows posting near 7pm PT only.
    - cron: "*/30 * * * *"
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: SECRET PRESENCE CHECK (Digest webhook)
        env:
          CONTENT_BOARD_WEBHOOK_URL: ${{ secrets.CONTENT_BOARD_WEBHOOK_URL }}
        run: |
          echo "CONTENT_BOARD_WEBHOOK_URL=$([ -n "$CONTENT_BOARD_WEBHOOK_URL" ] && echo PRESENT || echo MISSING)"
      - name: Run digest (posts to Discord)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.CONTENT_BOARD_WEBHOOK_URL }}
          DIGEST_FORCE_POST: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
          DIGEST_WINDOW_HOURS: "24"
          DIGEST_TOP_N: "5"
          DIGEST_MAX_PER_SOURCE: "1"
          DIGEST_GUARD_TZ: "America/Los_Angeles"
          DIGEST_GUARD_LOCAL_HOUR: "19"
          DIGEST_GUARD_LOCAL_MINUTE: "0"
          DIGEST_GUARD_WINDOW_MINUTES: "30"
          DIGEST_POST_ONCE_PER_DAY: "true"
          DIGEST_CACHE_FILE: ".digest_cache.json"
          DIGEST_EXPORT_FILE: "digest_latest.json"
          NEWSLETTER_NAME: "Itty Bitty Gaming News"
          NEWSLETTER_TAGLINE: "Your snackable video game news."
          USER_AGENT: "IttyBittyGamingNews/Digest"
          YOUTUBE_CHANNEL_ID: "UC0SJd4h7GQqoYTVjlDnSzqQ"
          YOUTUBE_RSS_URL: "https://www.youtube.com/feeds/videos.xml?channel_id=UC0SJd4h7GQqoYTVjlDnSzqQ"
          YOUTUBE_FILTER_SHORTS: "true"
          FEED_URLS: ${{ vars.FEED_URLS }}
        run: |
          python digest.py
      - name: Post to social media (OnlySocial)
        env:
          ONLYSOCIAL_TOKEN: ${{ secrets.ONLYSOCIAL_TOKEN }}
          ONLYSOCIAL_WORKSPACE_UUID: ${{ secrets.ONLYSOCIAL_WORKSPACE_UUID }}
          DIGEST_EXPORT_FILE: "digest_latest.json"
          YOUTUBE_URL: "https://www.youtube.com/@smitty-2447"
          PODCAST_URL: "https://podcasts.apple.com/us/podcast/itty-bitty-gaming-news/id1711880008"
          ONLYSOCIAL_MAX_HASHTAGS: "8"
          USER_AGENT: "IttyBittyGamingNews/OnlySocial"
        run: |
          python onlysocial_post.py
      - name: Send email digest (Mailchimp)
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_AUDIENCE_ID: ${{ secrets.MAILCHIMP_AUDIENCE_ID }}
          DIGEST_EXPORT_FILE: "digest_latest.json"
          YOUTUBE_URL: "https://www.youtube.com/@smitty-2447"
          PODCAST_URL: "https://podcasts.apple.com/us/podcast/itty-bitty-gaming-news/id1711880008"
        run: |
          python mailchimp_send.py
