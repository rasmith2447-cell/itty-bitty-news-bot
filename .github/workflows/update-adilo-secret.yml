name: Update Adilo Latest Video

on:
  # Run every day at noon Pacific (19:00 UTC) — before the 7pm digest
  schedule:
    - cron: "0 19 * * *"
  # Also allow manual trigger at any time
  workflow_dispatch: {}

jobs:
  update-adilo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Detect and update latest Adilo video ID
        env:
          ADILO_PUBLIC_KEY:  ${{ secrets.ADILO_PUBLIC_KEY }}
          ADILO_SECRET_KEY:  ${{ secrets.ADILO_SECRET_KEY }}
          ADILO_PROJECT_ID:  ${{ secrets.ADILO_PROJECT_ID }}
          ADILO_VIDEO_ID:    ${{ secrets.ADILO_VIDEO_ID }}
          GH_PAT:            ${{ secrets.GH_PAT }}
          # GITHUB_REPOSITORY is set automatically by GitHub Actions
          # ADILO_LIST_ORDER: "last"   # uncomment and set to "first" if needed
        run: python update_adilo.py
